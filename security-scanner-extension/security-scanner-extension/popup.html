<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #00ff88;
      --accent2: #ff3b6b;
      --accent3: #ffb800;
      --accent4: #4d9fff;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --critical: #ff3b6b;
      --high: #ff7c35;
      --medium: #ffb800;
      --low: #4d9fff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      min-height: 300px;
      max-height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #0d0d16 0%, #0a0f1a 100%);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .shield-icon {
      width: 28px; height: 28px;
      flex-shrink: 0;
    }

    h1 {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      padding-left: 38px;
    }

    .url-bar {
      margin-top: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Scan Button ── */
    .scan-area {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    #scanBtn {
      width: 100%;
      padding: 11px 0;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    #scanBtn:hover {
      background: rgba(0,255,136,0.06);
      box-shadow: 0 0 18px rgba(0,255,136,0.15);
    }

    #scanBtn:active {
      background: rgba(0,255,136,0.12);
    }

    #scanBtn.scanning {
      color: var(--muted);
      border-color: var(--muted);
      cursor: not-allowed;
      animation: pulse-border 1.2s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { border-color: var(--muted); }
      50% { border-color: var(--accent); }
    }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .scan-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .scanning .scan-dot {
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Stats bar ── */
    #statsBar {
      display: none;
      padding: 10px 20px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
    }

    #statsBar.visible {
      display: flex;
    }

    .stat-pill {
      flex: 1;
      text-align: center;
      padding: 5px 0;
      border-radius: 3px;
      font-family: 'Share Tech Mono', monospace;
    }

    .stat-pill .count {
      font-size: 18px;
      font-weight: 700;
      display: block;
      line-height: 1;
    }

    .stat-pill .label {
      font-size: 9px;
      letter-spacing: 0.08em;
      display: block;
      margin-top: 2px;
      text-transform: uppercase;
    }

    .pill-critical { background: rgba(255,59,107,0.1); color: var(--critical); border: 1px solid rgba(255,59,107,0.25); }
    .pill-high     { background: rgba(255,124,53,0.1); color: var(--high);     border: 1px solid rgba(255,124,53,0.25); }
    .pill-medium   { background: rgba(255,184,0,0.1);  color: var(--medium);   border: 1px solid rgba(255,184,0,0.25); }
    .pill-low      { background: rgba(77,159,255,0.1); color: var(--low);      border: 1px solid rgba(77,159,255,0.25); }

    /* ── Results ── */
    #results {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #results::-webkit-scrollbar { width: 4px; }
    #results::-webkit-scrollbar-track { background: transparent; }
    #results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 120px;
      gap: 8px;
      color: var(--muted);
    }

    .placeholder svg {
      opacity: 0.25;
    }

    .placeholder p {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    /* Finding card */
    .finding {
      margin-bottom: 8px;
      border-radius: 5px;
      border-left: 3px solid;
      background: rgba(255,255,255,0.02);
      padding: 9px 12px;
      animation: slide-in 0.2s ease-out;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .finding.critical { border-color: var(--critical); }
    .finding.high     { border-color: var(--high); }
    .finding.medium   { border-color: var(--medium); }
    .finding.low      { border-color: var(--low); }

    .finding-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .sev-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 5px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .finding.critical .sev-badge { background: rgba(255,59,107,0.2);  color: var(--critical); }
    .finding.high     .sev-badge { background: rgba(255,124,53,0.2);  color: var(--high); }
    .finding.medium   .sev-badge { background: rgba(255,184,0,0.2);   color: var(--medium); }
    .finding.low      .sev-badge { background: rgba(77,159,255,0.2);  color: var(--low); }

    .finding-type {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .finding-detail {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* All clear */
    .all-clear {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 120px;
      gap: 6px;
    }

    .all-clear .check {
      font-size: 28px;
    }

    .all-clear p {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.06em;
    }

    .all-clear small {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    /* ── Footer ── */
    footer {
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-note {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .footer-note a {
      color: var(--accent4);
      text-decoration: none;
    }

    #clearBtn {
      background: none;
      border: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.05em;
      padding: 2px 6px;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }

    #clearBtn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    /* Filter chips */
    #filterBar {
      display: none;
      padding: 6px 20px;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    #filterBar.visible {
      display: flex;
    }

    .chip {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.07em;
      padding: 3px 8px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid var(--border);
      color: var(--muted);
      background: transparent;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .chip.active-all   { border-color: var(--accent); color: var(--accent); }
    .chip.active-critical { border-color: var(--critical); color: var(--critical); }
    .chip.active-high     { border-color: var(--high);     color: var(--high); }
    .chip.active-medium   { border-color: var(--medium);   color: var(--medium); }
    .chip.active-low      { border-color: var(--low);      color: var(--low); }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-top">
      <svg class="shield-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 2L4 6V13C4 19.6 8.4 25.74 14 27C19.6 25.74 24 19.6 24 13V6L14 2Z" stroke="#00ff88" stroke-width="1.5" fill="rgba(0,255,136,0.06)"/>
        <path d="M10 14l3 3 5-5" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>WEB <span>SECURITY</span> SCANNER</h1>
    </div>
    <div class="subtitle">XSS · SQL INJECTION · SENSITIVE DATA · MISCONFIGURATIONS</div>
    <div class="url-bar" id="urlBar">—</div>
  </header>

  <!-- ── Scan Button ── -->
  <div class="scan-area">
    <button id="scanBtn">
      <span class="btn-inner">
        <span class="scan-dot"></span>
        <span id="btnLabel">RUN SECURITY SCAN</span>
      </span>
    </button>
  </div>

  <!-- ── Stats ── -->
  <div id="statsBar">
    <div class="stat-pill pill-critical">
      <span class="count" id="cCritical">0</span>
      <span class="label">Critical</span>
    </div>
    <div class="stat-pill pill-high">
      <span class="count" id="cHigh">0</span>
      <span class="label">High</span>
    </div>
    <div class="stat-pill pill-medium">
      <span class="count" id="cMedium">0</span>
      <span class="label">Medium</span>
    </div>
    <div class="stat-pill pill-low">
      <span class="count" id="cLow">0</span>
      <span class="label">Low</span>
    </div>
  </div>

  <!-- ── Filter chips ── -->
  <div id="filterBar">
    <button class="chip active-all" data-filter="all">All</button>
    <button class="chip" data-filter="critical">Critical</button>
    <button class="chip" data-filter="high">High</button>
    <button class="chip" data-filter="medium">Medium</button>
    <button class="chip" data-filter="low">Low</button>
  </div>

  <!-- ── Results ── -->
  <div id="results">
    <div class="placeholder">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="16" stroke="#6b6b80" stroke-width="1.5"/>
        <path d="M18 10v8l5 3" stroke="#6b6b80" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <p>AWAITING SCAN</p>
    </div>
  </div>

  <!-- ── Footer ── -->
  <footer>
    <span class="footer-note">Based on <a href="#" target="_blank">freeCodeCamp guide</a></span>
    <button id="clearBtn" style="display:none">CLEAR</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
