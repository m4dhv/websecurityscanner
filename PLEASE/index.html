
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebSec Scanner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <style>
        .vuln-card { border: 1px solid #444; padding: 10px; margin: 10px 0; border-left: 5px solid red; }
        .stats { display: flex; gap: 20px; font-weight: bold; color: #22C55E; }
    </style>
</head>
<body>
    <h1>🛡️ WebSec Scanner</h1>
    <input type="text" id="url" placeholder="Enter target URL (e.g. http://localhost:5000)">
    <input type="password" id="key" placeholder="Enter API Key">
    
    <button onclick="startScan('quickscan')">⚡ Quick Scan</button>
    <button onclick="startScan('deepscan')">🕷️ Deep Scan</button>

    <div id="status"></div>
    <div class="stats" id="stats"></div>
    <div id="results"></div>

    <script>
        async function startScan(type) {
            const url = document.getElementById('url').value;
            const key = document.getElementById('key').value;
            const status = document.getElementById('status');
            
            status.innerText = "🔍 Scanning... please wait.";
            document.getElementById('results').innerHTML = "";

            try {
                const res = await fetch(`http://localhost:8000/api/${type}`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify({ target_url: url })
                });

                const data = await res.json();
                status.innerText = data.success ? "✅ Scan Complete!" : "❌ Error: " + data.detail;
                
                if(data.success) {
                    document.getElementById('stats').innerText = `Total Found: ${data.total_vulnerabilities}`;
                    data.vulnerabilities.forEach(v => {
                        const div = document.createElement('div');
                        div.className = 'vuln-card';
                        div.innerHTML = `<strong>${v.type}</strong><br>URL: ${v.url}<br><small>${v.description}</small>`;
                        document.getElementById('results').appendChild(div);
                    });
                }
            } catch (err) {
                status.innerText = "❌ Connection failed. Is scanner.py running?";
            }
        }
    </script>
</body>
</html>
